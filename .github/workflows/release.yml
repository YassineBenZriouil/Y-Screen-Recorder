name: Release

# Builds installers for Windows, macOS, and Linux, then attaches them to a
# GitHub Release. Triggers when you push a tag that starts with "v"
# (e.g. `git tag v2.0.0 && git push origin v2.0.0`).
#
# The GITHUB_TOKEN secret is provided by GitHub automatically — no manual
# setup required for public repos. For private repos, the same token works.

on:
    push:
        tags:
            - "v*"
    workflow_dispatch: # allows manual runs from the Actions tab

jobs:
    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [windows-latest, macos-latest, ubuntu-latest]

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build renderer + main + preload
              run: npm run build

            - name: Package for Windows
              if: matrix.os == 'windows-latest'
              run: npx electron-builder --win --publish always
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Package for macOS
              if: matrix.os == 'macos-latest'
              run: npx electron-builder --mac --publish always
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Skip code signing / notarization in CI. Users who download
                  # the DMG will need to right-click → Open the first time.
                  CSC_IDENTITY_AUTO_DISCOVERY: false

            - name: Package for Linux
              if: matrix.os == 'ubuntu-latest'
              run: npx electron-builder --linux --publish always
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
